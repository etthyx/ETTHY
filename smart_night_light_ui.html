<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESP32智能夜灯</title>
<style>
:root {
  --r: 255;
  --g: 180;
  --b: 80;
  --brightness: 120;
  --beam-alpha: .35;
  --lamp-alpha: .54;
  --halo-a: 48px;
  --halo-b: 108px;
  --accent: rgb(var(--r), var(--g), var(--b));
  --accent-soft: rgba(var(--r), var(--g), var(--b), .18);
  --accent-line: rgba(var(--r), var(--g), var(--b), .54);
  --paper: #f4f5f2;
  --paper-2: #e9ebe7;
  --ink: #111315;
  --muted: rgba(17, 19, 21, .56);
  --line: rgba(17, 19, 21, .13);
  --dark: #101316;
  --dark-2: #1a1f23;
  color-scheme: light;
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  font-family: "SF Pro Display", "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
  color: var(--ink);
  background:
    linear-gradient(90deg, rgba(17,19,21,.055) 1px, transparent 1px),
    linear-gradient(180deg, rgba(17,19,21,.045) 1px, transparent 1px),
    radial-gradient(circle at 78% 12%, rgba(var(--r), var(--g), var(--b), .18), transparent 28%),
    linear-gradient(135deg, #fafaf7 0%, #e8eae6 48%, #d8dbd5 100%);
  background-size: 28px 28px, 28px 28px, auto, auto;
  display: grid;
  place-items: center;
  padding: 24px;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(120deg, transparent 0 23%, rgba(255,255,255,.64) 23.2% 23.6%, transparent 23.8%),
    linear-gradient(120deg, transparent 0 68%, rgba(17,19,21,.08) 68.1% 68.4%, transparent 68.6%);
}

.shell {
  width: min(960px, calc(100vw - 48px));
}

.panel {
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(17,19,21,.14);
  border-radius: 28px;
  background: rgba(250, 250, 247, .74);
  box-shadow:
    0 40px 100px rgba(28, 32, 34, .22),
    inset 0 1px 0 rgba(255,255,255,.72);
  backdrop-filter: blur(30px) saturate(120%);
  -webkit-backdrop-filter: blur(30px) saturate(120%);
}

.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, transparent 0 25%, rgba(17,19,21,.07) 25% 25.2%, transparent 25.2% 50%, rgba(17,19,21,.05) 50% 50.2%, transparent 50.2% 75%, rgba(17,19,21,.07) 75% 75.2%, transparent 75.2%),
    linear-gradient(180deg, transparent 0 122px, rgba(17,19,21,.08) 122px 123px, transparent 123px);
}

.panel > * {
  position: relative;
  z-index: 1;
}

.top {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 24px;
  padding: 34px 36px 24px;
}

.title-block {
  display: grid;
  gap: 10px;
}

.eyebrow {
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: .24em;
}

h1 {
  margin: 0;
  font-size: clamp(34px, 5vw, 58px);
  line-height: .95;
  font-weight: 760;
  letter-spacing: 0;
}

.subtitle {
  max-width: 520px;
  margin: 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
}

.status {
  display: inline-grid;
  grid-template-columns: 8px auto;
  align-items: center;
  gap: 10px;
  min-width: 108px;
  padding: 11px 14px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.52);
  color: var(--muted);
  font-size: 13px;
  font-weight: 640;
  white-space: nowrap;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #111315;
  box-shadow: 0 0 0 5px rgba(17,19,21,.08);
}

.hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) 280px;
  gap: 1px;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: var(--line);
}

.light-stage {
  position: relative;
  min-height: 360px;
  padding: 28px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255,255,255,.05) 1px, transparent 1px),
    radial-gradient(circle at 50% 50%, rgba(var(--r), var(--g), var(--b), var(--beam-alpha)), transparent 35%),
    linear-gradient(135deg, #1a1f23, #080a0b);
  background-size: 24px 24px, 24px 24px, auto, auto;
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 48px), calc(100% - 48px) 100%, 0 100%);
}

.light-stage::before {
  content: "";
  position: absolute;
  inset: 28px;
  border: 1px solid rgba(255,255,255,.18);
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 36px), calc(100% - 36px) 100%, 0 100%);
}

.light-orb {
  position: absolute;
  left: 50%;
  top: 50%;
  width: min(210px, 42vw);
  aspect-ratio: 1;
  transform: translate(-50%, -50%);
  border: 1px solid rgba(255,255,255,.26);
  border-radius: 50%;
  background:
    linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,0) 42%),
    rgba(var(--r), var(--g), var(--b), var(--lamp-alpha));
  box-shadow:
    0 0 var(--halo-a) rgba(var(--r), var(--g), var(--b), .68),
    0 0 var(--halo-b) rgba(var(--r), var(--g), var(--b), .34);
}

.axis {
  position: absolute;
  inset: 50% 28px auto;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
}

.axis::after {
  content: "";
  position: absolute;
  left: 50%;
  top: -150px;
  width: 1px;
  height: 300px;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,.28), transparent);
}

.telemetry {
  display: grid;
  grid-template-rows: repeat(3, 1fr);
  background: rgba(255,255,255,.48);
}

.readout-cell {
  display: grid;
  align-content: center;
  gap: 8px;
  padding: 26px;
  border-bottom: 1px solid var(--line);
}

.readout-cell:last-child {
  border-bottom: 0;
}

.readout-label {
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: .18em;
}

.readout-value {
  color: var(--ink);
  font-size: 24px;
  font-weight: 760;
  letter-spacing: 0;
}

.microcopy {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}

.controls {
  padding: 26px 36px 34px;
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: 24px;
}

.palette {
  display: grid;
  gap: 18px;
  align-content: start;
  min-width: 0;
}

.color-unit {
  display: grid;
  grid-template-columns: 112px 1fr;
  gap: 18px;
  align-items: stretch;
}

input[type="color"] {
  width: 112px;
  height: 112px;
  padding: 0;
  border: 1px solid var(--line);
  border-radius: 24px;
  background: transparent;
  overflow: hidden;
  cursor: pointer;
}

.swatch-copy {
  display: grid;
  align-content: space-between;
  min-height: 112px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: 24px;
  background: rgba(255,255,255,.46);
}

.swatch-title {
  margin: 0;
  color: var(--ink);
  font-size: 14px;
  font-weight: 720;
}

.status-line {
  height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
}

.control-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  min-width: 0;
}

.effect-grid {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 10px;
}

.effect-option {
  min-height: 84px;
  position: relative;
  min-width: 0;
}

.effect-option input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.effect-card {
  height: 100%;
  display: grid;
  align-content: space-between;
  gap: 12px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background: rgba(255,255,255,.42);
  color: var(--muted);
  cursor: pointer;
  transition: border-color .2s ease, background .2s ease, transform .2s ease;
  min-width: 0;
}

.effect-name {
  color: var(--ink);
  font-size: 13px;
  font-weight: 760;
}

.effect-code {
  font-size: 10px;
  font-weight: 760;
  letter-spacing: .16em;
}

.effect-option input:checked + .effect-card {
  border-color: rgba(17,19,21,.38);
  background:
    linear-gradient(135deg, rgba(var(--r), var(--g), var(--b), .16), transparent 70%),
    rgba(255,255,255,.74);
  transform: translateY(-1px);
}

.control {
  min-height: 138px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 24px;
  background: rgba(255,255,255,.48);
  display: grid;
  align-content: space-between;
  min-width: 0;
}

.label {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 760;
  letter-spacing: .12em;
}

.value {
  width: 72px;
  height: 36px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.7);
  color: var(--ink);
  font: inherit;
  font-size: 14px;
  font-weight: 720;
  text-align: center;
  outline: none;
}

input[type="range"] {
  width: 100%;
  height: 34px;
  appearance: none;
  background: transparent;
  outline: none;
}

input[type="range"]::-webkit-slider-runnable-track {
  height: 3px;
  border-radius: 999px;
  background: rgba(17,19,21,.16);
}

input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 24px;
  height: 24px;
  margin-top: -10.5px;
  border: 1px solid rgba(17,19,21,.2);
  border-radius: 50%;
  background: #fbfbf8;
  box-shadow: 0 10px 24px rgba(17,19,21,.18);
}

input[type="range"]::-moz-range-track {
  height: 3px;
  border-radius: 999px;
  background: rgba(17,19,21,.16);
}

input[type="range"]::-moz-range-thumb {
  width: 22px;
  height: 22px;
  border: 1px solid rgba(17,19,21,.2);
  border-radius: 50%;
  background: #fbfbf8;
  box-shadow: 0 10px 24px rgba(17,19,21,.18);
}

.range-red::-webkit-slider-runnable-track {
  background: linear-gradient(90deg, rgba(17,19,21,.14), #ff453a);
}

.range-green::-webkit-slider-runnable-track {
  background: linear-gradient(90deg, rgba(17,19,21,.14), #32d74b);
}

.range-blue::-webkit-slider-runnable-track {
  background: linear-gradient(90deg, rgba(17,19,21,.14), #0a84ff);
}

.range-bright::-webkit-slider-runnable-track {
  background: linear-gradient(90deg, rgba(17,19,21,.14), var(--accent));
}

.range-red::-moz-range-track {
  background: linear-gradient(90deg, rgba(17,19,21,.14), #ff453a);
}

.range-green::-moz-range-track {
  background: linear-gradient(90deg, rgba(17,19,21,.14), #32d74b);
}

.range-blue::-moz-range-track {
  background: linear-gradient(90deg, rgba(17,19,21,.14), #0a84ff);
}

.range-bright::-moz-range-track {
  background: linear-gradient(90deg, rgba(17,19,21,.14), var(--accent));
}

.actions {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: minmax(220px, 320px) 1fr;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

button {
  width: 100%;
  max-width: 100%;
  height: 58px;
  border: 0;
  border-radius: 999px;
  background: var(--ink);
  color: #fff;
  font-size: 16px;
  font-weight: 760;
  box-shadow: 0 22px 48px rgba(17,19,21,.22);
  cursor: pointer;
}

.hint {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.6;
}

@media (max-width: 760px) {
  body {
    padding: 14px;
  }

  .shell {
    width: min(960px, calc(100vw - 28px));
  }

  .top {
    grid-template-columns: 1fr;
    padding: 26px 22px 20px;
  }

  .status {
    justify-self: start;
  }

  .hero-grid {
    grid-template-columns: 1fr;
  }

  .light-stage {
    min-height: 300px;
  }

  .telemetry {
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: auto;
  }

  .readout-cell {
    padding: 18px;
    border-bottom: 0;
    border-right: 1px solid var(--line);
  }

  .readout-cell:last-child {
    border-right: 0;
  }

  .readout-value {
    font-size: 18px;
  }

  .controls {
    grid-template-columns: 1fr;
    padding: 22px;
  }

  .actions {
    grid-template-columns: 1fr;
  }

  .actions button {
    width: calc(100% - 12px);
    justify-self: start;
  }

  .control-grid {
    grid-template-columns: 1fr;
  }

  .effect-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 460px) {
  .panel {
    border-radius: 22px;
  }

  .telemetry {
    grid-template-columns: 1fr;
  }

  .readout-cell {
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .readout-cell:last-child {
    border-bottom: 0;
  }

  .color-unit {
    grid-template-columns: 96px 1fr;
  }

  input[type="color"] {
    width: 96px;
    height: 96px;
    border-radius: 20px;
  }
}
</style>
</head>
<body>
<main class="shell">
  <section class="panel">
    <div class="top">
      <div class="title-block">
        <span class="eyebrow">LUMEN SYSTEM / ESP32</span>
        <h1>智能夜灯控制</h1>
        <p class="subtitle">几何光场、RGB 混色与亮度输出集中在一个克制的控制界面中。</p>
      </div>
      <div class="status"><span class="dot"></span><span>待触发</span></div>
    </div>

    <form action="/setRGB" method="get" id="colorForm">
      <div class="hero-grid">
        <div class="light-stage" aria-label="颜色预览">
          <div class="axis"></div>
          <div class="light-orb"></div>
        </div>
        <div class="telemetry">
          <div class="readout-cell">
            <span class="readout-label">COLOR</span>
            <span class="readout-value" id="hexText">#FFB450</span>
            <span class="microcopy">实时 RGB 输出</span>
          </div>
          <div class="readout-cell">
            <span class="readout-label">POWER</span>
            <span class="readout-value" id="powerText">47%</span>
            <span class="microcopy">最大亮度限制</span>
          </div>
          <div class="readout-cell">
            <span class="readout-label">MODE</span>
            <span class="readout-value" id="effectText">STATIC</span>
            <span class="microcopy">灯效输出模式</span>
          </div>
        </div>
      </div>

      <div class="controls">
        <div class="palette">
          <div class="color-unit">
            <input type="color" id="colorPicker" value="#FFB450" aria-label="调色盘">
            <div class="swatch-copy">
              <p class="swatch-title">Precision color mix</p>
              <div class="status-line"></div>
              <span class="microcopy">拖动色块或下方通道，实时校准光色。</span>
            </div>
          </div>

        </div>

        <div class="control-grid">
          <div class="control">
            <div class="label"><span>R CHANNEL</span><input class="value" type="number" id="rNumber" name="r" min="0" max="255" value="255"></div>
            <input class="range-red" type="range" id="rRange" min="0" max="255" value="255">
          </div>

          <div class="control">
            <div class="label"><span>G CHANNEL</span><input class="value" type="number" id="gNumber" name="g" min="0" max="255" value="180"></div>
            <input class="range-green" type="range" id="gRange" min="0" max="255" value="180">
          </div>

          <div class="control">
            <div class="label"><span>B CHANNEL</span><input class="value" type="number" id="bNumber" name="b" min="0" max="255" value="80"></div>
            <input class="range-blue" type="range" id="bRange" min="0" max="255" value="80">
          </div>

          <div class="control">
            <div class="label"><span>OUTPUT</span><input class="value" type="number" id="brightnessNumber" min="0" max="255" value="120"></div>
            <input class="range-bright" type="range" id="brightnessRange" name="brightness" min="0" max="255" value="120">
          </div>

          <div class="effect-grid">
            <label class="effect-option">
              <input type="radio" name="effect" value="0" checked>
              <span class="effect-card"><span class="effect-name">静态</span><span class="effect-code">STATIC</span></span>
            </label>
            <label class="effect-option">
              <input type="radio" name="effect" value="1">
              <span class="effect-card"><span class="effect-name">流水渐变</span><span class="effect-code">FLOW</span></span>
            </label>
            <label class="effect-option">
              <input type="radio" name="effect" value="2">
              <span class="effect-card"><span class="effect-name">扩散渐变</span><span class="effect-code">SPREAD</span></span>
            </label>
            <label class="effect-option">
              <input type="radio" name="effect" value="3">
              <span class="effect-card"><span class="effect-name">雨滴</span><span class="effect-code">RAIN</span></span>
            </label>
            <label class="effect-option">
              <input type="radio" name="effect" value="4">
              <span class="effect-card"><span class="effect-name">呼吸</span><span class="effect-code">BREATH</span></span>
            </label>
            <label class="effect-option">
              <input type="radio" name="effect" value="5">
              <span class="effect-card"><span class="effect-name">紫熵</span><span class="effect-code">PURPLE</span></span>
            </label>
          </div>
        </div>

        <div class="actions">
          <button type="submit">应用控制参数</button>
          <p class="hint">连接热点 ESP32_LED 后，在浏览器打开 192.168.4.1</p>
        </div>
      </div>
    </form>
  </section>
</main>

<script>
const root = document.documentElement;
const colorPicker = document.getElementById('colorPicker');
const hexText = document.getElementById('hexText');
const powerText = document.getElementById('powerText');
const effectText = document.getElementById('effectText');
const form = document.getElementById('colorForm');
const effectLabels = ['STATIC', 'FLOW', 'SPREAD', 'RAIN', 'BREATH', 'PURPLE'];

const controls = {
  r: [document.getElementById('rRange'), document.getElementById('rNumber')],
  g: [document.getElementById('gRange'), document.getElementById('gNumber')],
  b: [document.getElementById('bRange'), document.getElementById('bNumber')],
  brightness: [
    document.getElementById('brightnessRange'),
    document.getElementById('brightnessNumber')
  ]
};

function clamp(value) {
  return Math.max(0, Math.min(255, Number(value) || 0));
}

function toHex(value) {
  return clamp(value).toString(16).padStart(2, '0');
}

function currentColor() {
  return {
    r: clamp(controls.r[0].value),
    g: clamp(controls.g[0].value),
    b: clamp(controls.b[0].value),
    brightness: clamp(controls.brightness[0].value)
  };
}

function syncFromRGB() {
  const color = currentColor();
  root.style.setProperty('--r', color.r);
  root.style.setProperty('--g', color.g);
  root.style.setProperty('--b', color.b);
  root.style.setProperty('--brightness', color.brightness);
  root.style.setProperty('--beam-alpha', (color.brightness / 255 * .74).toFixed(3));
  root.style.setProperty('--lamp-alpha', (.14 + color.brightness / 255 * .76).toFixed(3));
  root.style.setProperty('--halo-a', Math.round(22 + color.brightness * .22) + 'px');
  root.style.setProperty('--halo-b', Math.round(64 + color.brightness * .38) + 'px');

  controls.r.forEach(input => input.value = color.r);
  controls.g.forEach(input => input.value = color.g);
  controls.b.forEach(input => input.value = color.b);
  controls.brightness.forEach(input => input.value = color.brightness);

  const hex = '#' + toHex(color.r) + toHex(color.g) + toHex(color.b);
  colorPicker.value = hex;
  hexText.textContent = hex.toUpperCase();
  powerText.textContent = Math.round(color.brightness / 255 * 100) + '%';
}

function syncFromPicker() {
  const hex = colorPicker.value.replace('#', '');
  controls.r.forEach(input => input.value = parseInt(hex.slice(0, 2), 16));
  controls.g.forEach(input => input.value = parseInt(hex.slice(2, 4), 16));
  controls.b.forEach(input => input.value = parseInt(hex.slice(4, 6), 16));
  syncFromRGB();
}

Object.values(controls).flat().forEach(input => {
  input.addEventListener('input', syncFromRGB);
});

colorPicker.addEventListener('input', syncFromPicker);

document.querySelectorAll('input[name="effect"]').forEach(input => {
  input.addEventListener('change', () => {
    effectText.textContent = effectLabels[Number(input.value)] || 'STATIC';
  });
});

form.addEventListener('submit', event => {
  syncFromRGB();
  if (window.location.protocol === 'file:') {
    event.preventDefault();
  }
});

syncFromRGB();
</script>
</body>
</html>
